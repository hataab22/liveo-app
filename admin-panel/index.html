<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liveo - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1A1A2E 0%, #0F0F1E 100%);
            color: #fff;
            min-height: 100vh;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: #2E2E3E;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(200, 80, 255, 0.2);
            max-width: 400px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            background: linear-gradient(135deg, #C850FF, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 48px;
            font-weight: bold;
        }

        .logo p {
            color: #B0B0B0;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #3E3E4E;
            border-radius: 10px;
            background: #1A1A2E;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #C850FF;
            box-shadow: 0 0 15px rgba(200, 80, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #C850FF, #00D9FF);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .admin-panel {
            display: none;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: #2E2E3E;
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            background: linear-gradient(135deg, #C850FF, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #FF4444;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            width: auto;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2E2E3E;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-card h3 {
            color: #B0B0B0;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card p {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #C850FF, #00D9FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .create-code {
            background: #2E2E3E;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .create-code h2 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #B0B0B0;
        }

        .codes-table {
            background: #2E2E3E;
            padding: 30px;
            border-radius: 15px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #3E3E4E;
        }

        th {
            color: #B0B0B0;
            font-weight: 600;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-active {
            background: #00FF88;
            color: #000;
        }

        .badge-inactive {
            background: #FF4444;
            color: #fff;
        }

        .badge-expired {
            background: #FFB800;
            color: #000;
        }

        .action-btn {
            padding: 8px 15px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete {
            background: #FF4444;
            color: #fff;
        }

        .btn-toggle {
            background: #00D9FF;
            color: #fff;
        }

        .success-msg {
            background: #00FF88;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="logo">
                <h1>Liveo</h1>
                <p>Admin Panel</p>
            </div>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="header">
            <h1>🎛️ Liveo Admin</h1>
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>إجمالي الأكواد</h3>
                <p id="totalCodes">0</p>
            </div>
            <div class="stat-card">
                <h3>أكواد نشطة</h3>
                <p id="activeCodes">0</p>
            </div>
            <div class="stat-card">
                <h3>أكواد منتهية</h3>
                <p id="expiredCodes">0</p>
            </div>
        </div>

        <div class="create-code">
            <h2>➕ إنشاء كود جديد</h2>
            <div id="successMsg" class="success-msg"></div>
            <div class="form-group">
                <label>كود التفعيل (اتركه فارغاً للإنشاء التلقائي)</label>
                <input type="text" id="newCode" placeholder="مثال: ABC12345">
            </div>
            <div class="form-group">
                <label>رابط M3U *</label>
                <input type="text" id="m3uUrl" placeholder="http://example.com/playlist.m3u">
            </div>
            <div class="form-group">
                <label>المدة (بالأيام) *</label>
                <input type="number" id="duration" value="30">
            </div>
            <div class="form-group">
                <label>اسم العميل (اختياري)</label>
                <input type="text" id="customerName" placeholder="محمد أحمد">
            </div>
            <button onclick="createCode()">إنشاء كود</button>
        </div>

        <div class="codes-table">
            <h2>📋 جميع الأكواد</h2>
            <table>
                <thead>
                    <tr>
                        <th>الكود</th>
                        <th>العميل</th>
                        <th>المدة</th>
                        <th>المتبقي</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="codesTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Backend API URL
        const API_URL = 'https://liveo-backend.onrender.com';

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            fetch(`${API_URL}/admin/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    loadCodes();
                } else {
                    alert('خطأ في البيانات');
                }
            });
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function createCode() {
            const code = document.getElementById('newCode').value;
            const m3u_url = document.getElementById('m3uUrl').value;
            const duration_days = document.getElementById('duration').value;
            const customer_name = document.getElementById('customerName').value;

            if (!m3u_url) {
                alert('الرجاء إدخال رابط M3U');
                return;
            }

            fetch(`${API_URL}/admin/create_code`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code, m3u_url, duration_days, customer_name})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const msg = document.getElementById('successMsg');
                    msg.textContent = `✅ تم إنشاء الكود: ${data.code}`;
                    msg.style.display = 'block';
                    setTimeout(() => msg.style.display = 'none', 5000);
                    
                    // مسح الحقول
                    document.getElementById('newCode').value = '';
                    document.getElementById('m3uUrl').value = '';
                    document.getElementById('customerName').value = '';
                    
                    loadCodes();
                } else {
                    alert(data.message);
                }
            });
        }

        function loadCodes() {
            fetch(`${API_URL}/admin/codes`)
            .then(res => res.json())
            .then(codes => {
                updateStats(codes);
                displayCodes(codes);
            });
        }

        function updateStats(codes) {
            const total = codes.length;
            const active = codes.filter(c => c.is_active && !c.is_expired).length;
            const expired = codes.filter(c => c.is_expired).length;

            document.getElementById('totalCodes').textContent = total;
            document.getElementById('activeCodes').textContent = active;
            document.getElementById('expiredCodes').textContent = expired;
        }

        function displayCodes(codes) {
            const table = document.getElementById('codesTable');
            table.innerHTML = '';

            codes.forEach(code => {
                const status = code.is_expired ? 'منتهي' : (code.is_active ? 'نشط' : 'معطل');
                const badgeClass = code.is_expired ? 'badge-expired' : (code.is_active ? 'badge-active' : 'badge-inactive');

                const row = `
                    <tr>
                        <td><strong>${code.code}</strong></td>
                        <td>${code.customer_name || '-'}</td>
                        <td>${code.duration_days} يوم</td>
                        <td>${code.days_left} يوم</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                        <td>
                            <button class="action-btn btn-toggle" onclick="toggleCode('${code.code}')">
                                ${code.is_active ? 'تعطيل' : 'تفعيل'}
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteCode('${code.code}')">حذف</button>
                        </td>
                    </tr>
                `;
                table.innerHTML += row;
            });
        }

        function deleteCode(code) {
            if (confirm(`هل تريد حذف الكود: ${code}؟`)) {
                fetch(`${API_URL}/admin/delete_code/${code}`, {method: 'DELETE'})
                .then(() => loadCodes());
            }
        }

        function toggleCode(code) {
            fetch(`${API_URL}/admin/toggle_code/${code}`, {method: 'POST'})
            .then(() => loadCodes());
        }
    </script>
</body>
</html>
